<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lego Invincible Battlegrounds</title>
    
    <script src="/socket.io/socket.io.js"></script>

    <style>
        /* Base Reset */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0f172a; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

        /* The Game Arena */
        #arena {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
            overflow: hidden;
            border-bottom: 4px solid #334155;
        }

        /* Player Container (Absolute Positioning) */
        .player {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Smooth movement interpolation */
            transition: transform 0.05s linear;
            transform: translate(-50%, -50%); /* Center origin */
        }

        .player-name {
            font-size: 0.8rem;
            font-weight: bold;
            color: #fcd34d;
            text-shadow: 1px 1px 0 #000;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        /* Pure CSS Minifigure Design */
        .head { width: 30px; height: 30px; border-radius: 6px; border: 2px solid #000; margin-bottom: 2px; position: relative; background: #fcd34d; }
        .head::before { content: ''; position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 12px; height: 3px; border: 2px solid #000; border-bottom: none; border-radius: 2px 2px 0 0; background: inherit; }
        .torso-wrapper { position: relative; display: flex; justify-content: center; }
        .torso { width: 40px; height: 35px; border-radius: 3px 3px 0 0; border: 2px solid #000; z-index: 2; background: #3b82f6; }
        .arm { width: 12px; height: 28px; border: 2px solid #000; border-radius: 10px; position: absolute; top: 3px; z-index: 1; background: #eab308; }
        .arm.left { right: 100%; margin-right: -4px; transform: rotate(15deg); }
        .arm.right { left: 100%; margin-left: -4px; transform: rotate(-15deg); }
        .legs { width: 40px; height: 25px; border: 2px solid #000; border-top: none; display: flex; }
        .leg { width: 50%; height: 100%; border-right: 1px solid #000; background: #3b82f6; }
        .leg:last-child { border-right: none; border-left: 1px solid #000; }

        /* Mobile D-Pad Controls */
        #controls {
            height: 200px;
            background: #1e293b;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 20px;
            justify-items: center;
            align-items: center;
            max-width: 300px;
            margin: 0 auto;
        }

        .btn {
            background: #334155;
            border: 3px solid #020617;
            border-radius: 12px;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            color: #94a3b8;
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.5), 0 6px 0px #020617;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: inset -3px -3px 0px rgba(0,0,0,0.5), 0 0px 0px #020617;
            background: #475569;
        }

        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
        #right { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>

    <div id="arena"></div>

    <div id="controls">
        <div class="btn" id="up">▲</div>
        <div class="btn" id="left">◀</div>
        <div class="btn" id="down">▼</div>
        <div class="btn" id="right">▶</div>
    </div>

    <script>
        const socket = io();
        const arena = document.getElementById('arena');
        const playersData = {}; // Stores DOM elements

        // --- MULTIPLAYER NETWORKING ---

        // When we first connect, load all existing players
        socket.on('currentPlayers', (players) => {
            Object.keys(players).forEach(id => {
                addPlayerToArena(players[id]);
            });
        });

        // When a new player joins, add them
        socket.on('newPlayer', (playerInfo) => {
            addPlayerToArena(playerInfo);
        });

        // When a player moves, update their position on screen
        socket.on('playerMoved', (playerInfo) => {
            if (playersData[playerInfo.id]) {
                const el = playersData[playerInfo.id];
                el.style.transform = `translate(calc(${playerInfo.x}px - 50%), calc(${playerInfo.y}px - 50%))`;
            }
        });

        // When a player leaves, remove their element
        socket.on('playerDisconnected', (playerId) => {
            if (playersData[playerId]) {
                playersData[playerId].remove();
                delete playersData[playerId];
            }
        });

        // --- RENDERING ---

        function addPlayerToArena(playerInfo) {
            const playerEl = document.createElement('div');
            playerEl.className = 'player';
            playerEl.id = playerInfo.id;
            
            // Render the Lego character
            playerEl.innerHTML = `
                <div class="player-name">${playerInfo.id === socket.id ? 'YOU' : 'Enemy'}</div>
                <div class="head"></div>
                <div class="torso-wrapper">
                    <div class="arm left"></div>
                    <div class="torso"></div>
                    <div class="arm right"></div>
                </div>
                <div class="legs">
                    <div class="leg"></div>
                    <div class="leg"></div>
                </div>
            `;
            
            playerEl.style.transform = `translate(calc(${playerInfo.x}px - 50%), calc(${playerInfo.y}px - 50%))`;
            arena.appendChild(playerEl);
            playersData[playerInfo.id] = playerEl;
        }

        // --- MOVEMENT CONTROLS ---

        let myX = window.innerWidth / 2; // Start in middle of screen
        let myY = 150; 
        const speed = 10;
        
        const keys = { w: false, a: false, s: false, d: false };

        // Keyboard support for desktop testing
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // Mobile D-Pad Support (Touch & Mouse)
        const bindButton = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
            btn.addEventListener('mouseleave', () => keys[key] = false);
        };

        bindButton('up', 'w');
        bindButton('down', 's');
        bindButton('left', 'a');
        bindButton('right', 'd');

        // Game Loop: Send movement to server 60 times a second
        setInterval(() => {
            let moved = false;
            if (keys.w) { myY -= speed; moved = true; }
            if (keys.s) { myY += speed; moved = true; }
            if (keys.a) { myX -= speed; moved = true; }
            if (keys.d) { myX += speed; moved = true; }

            if (moved && playersData[socket.id]) {
                // Update my own screen instantly (Client-Side Prediction)
                const myEl = playersData[socket.id];
                myEl.style.transform = `translate(calc(${myX}px - 50%), calc(${myY}px - 50%))`;
                
                // Tell the server where I went
                socket.emit('playerMovement', { x: myX, y: myY });
            }
        }, 1000 / 60);

    </script>
</body>
</html>
