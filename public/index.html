<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLEGROUNDS: INVINCIBLE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            font-family: 'Orbitron', sans-serif; user-select: none;
            touch-action: none; -webkit-touch-callout: none;
        }
        #gameCanvas { display: none; width: 100%; height: 100%; } 
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; color: white; background: rgba(5, 5, 8, 0.9);
        }
        .login-box {
            background: rgba(20, 20, 30, 0.8); padding: 2rem; border-radius: 10px;
            border: 2px solid #fff; box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center; width: 80%; max-width: 400px;
        }
        .login-box h1 { margin-top: 0; color: #fff; text-shadow: 0 0 10px #fff; }
        input, select {
            width: 85%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444;
            color: #fff; font-family: 'Orbitron', sans-serif; font-size: 1rem; text-align: center;
        }
        input:focus, select:focus { outline: none; border-color: #ff0055; box-shadow: 0 0 10px #ff0055; }
        button {
            width: 100%; padding: 15px; margin-top: 15px; background: #fff; color: #000;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem;
            border: none; cursor: pointer; transition: 0.2s;
        }
        button:hover, button:active { background: #ff0055; color: white; box-shadow: 0 0 15px #ff0055; }
        #error-msg { color: #ff0055; font-size: 0.9rem; margin-top: 10px; text-shadow: 0 0 5px #ff0055; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none; display: none; flex-direction: column; justify-content: space-between;
        }
        
        #leaderboard {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5);
            padding: 10px; border: 1px solid #444; color: white; font-size: 0.8rem;
            min-width: 150px; text-align: right;
        }
        .lb-entry { margin: 5px 0; }

        .controls { text-align: center; padding: 1rem; color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        
        .action-btn {
            position: absolute; bottom: 10%; right: 5%; width: 80px; height: 80px;
            border-radius: 50%; background: rgba(0, 0, 0, 0.5); color: white;
            font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 900;
            border: 2px solid #fff; box-shadow: 0 0 15px #fff;
            z-index: 20; pointer-events: auto; display: flex; align-items: center; justify-content: center;
        }
        .action-btn:active { background: rgba(255, 255, 255, 0.2); }
        @media (hover: hover) and (pointer: fine) { .action-btn { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>BATTLEGROUNDS</h1>
            <input type="text" id="usernameInput" placeholder="USERNAME" maxlength="12" autocomplete="off">
            <input type="text" id="roomInput" placeholder="ROOM CODE" maxlength="10" autocomplete="off">
            <select id="charSelect">
                <option value="omniman">Omni-Man (Melee/Dash)</option>
                <option value="thragg">Thragg (Heavy Melee)</option>
                <option value="eve">Atom Eve (Shield Blasts)</option>
                <option value="techjacket">Tech Jacket (Rapid Lasers)</option>
            </select>
            <button id="joinBtn">DEPLOY</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="leaderboard">
            <div style="color:#888; margin-bottom:5px;">TOP KILLERS</div>
            <div id="lb-list"></div>
        </div>
        <div class="action-btn" id="actionBtn">ATTACK</div>
        <div class="controls">JOYSTICK/WASD: MOVE | BUTTON/SPACE: ATTACK</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const loginScreen = document.getElementById('login-screen');
        const uiLayer = document.getElementById('ui-layer');
        const joinBtn = document.getElementById('joinBtn');
        const errorMsg = document.getElementById('error-msg');
        const actionBtn = document.getElementById('actionBtn');
        const lbList = document.getElementById('lb-list');

        let width, height, myId = null;
        let gameActive = false;
        let shakeTime = 0, shakeMagnitude = 0;

        // Character Moveset Configurations
        const CHAR_STATS = {
            'omniman': { color: '#ff2222', speed: 1.3, cd: 40, type: 'dash', size: 16, dashPower: 25 },
            'thragg': { color: '#8b0000', speed: 1.1, cd: 60, type: 'dash', size: 18, dashPower: 35 },
            'eve': { color: '#ff69b4', speed: 0.9, cd: 30, type: 'shoot', size: 14, bRadius: 10, bSpeed: 8, bounce: 3 },
            'techjacket': { color: '#ffd700', speed: 1.0, cd: 8, type: 'shoot', size: 15, bRadius: 3, bSpeed: 18, bounce: 0 }
        };

        const players = {};
        const bullets = [];
        const particles = [];

        function shakeScreen(magnitude, time) { shakeMagnitude = magnitude; shakeTime = time; }

        joinBtn.addEventListener('click', () => {
            const user = document.getElementById('usernameInput').value.trim();
            const room = document.getElementById('roomInput').value.trim().toUpperCase();
            const char = document.getElementById('charSelect').value;
            if (!user || !room) { errorMsg.innerText = "USERNAME AND ROOM REQUIRED"; return; }
            errorMsg.innerText = "CONNECTING...";
            socket.emit('joinRoom', { username: user, room: room, character: char });
        });

        socket.on('init', (data) => {
            myId = data.id;
            
            // Populate existing players
            for (let id in data.players) {
                const pInfo = data.players[id];
                const stats = CHAR_STATS[pInfo.character];
                players[id] = new Player(id, pInfo.username, stats);
                players[id].score = pInfo.score;
            }

            // Set Action button color based on your character
            actionBtn.style.borderColor = CHAR_STATS[players[myId].stats.color];
            
            loginScreen.style.display = 'none';
            canvas.style.display = 'block';
            uiLayer.style.display = 'flex';
            gameActive = true;
            resize(); loop(); 
            updateLeaderboard();
        });

        socket.on('roomError', (msg) => { errorMsg.innerText = msg; });
        
        socket.on('playerJoined', (pInfo) => {
            players[pInfo.id] = new Player(pInfo.id, pInfo.username, CHAR_STATS[pInfo.character]);
            updateLeaderboard();
        });

        socket.on('playerLeft', (id) => {
            delete players[id];
            updateLeaderboard();
        });

        socket.on('updateLeaderboard', (serverPlayers) => {
            for(let id in serverPlayers) {
                if(players[id]) players[id].score = serverPlayers[id].score;
            }
            updateLeaderboard();
        });

        socket.on('opponentMoved', (data) => {
            if(players[data.id]) {
                players[data.id].x = data.x;
                players[data.id].y = data.y;
                players[data.id].angle = data.angle;
            }
        });

        socket.on('opponentAction', (data) => {
            if(!players[data.id]) return;
            const p = players[data.id];
            
            if(data.type === 'shoot') {
                bullets.push(new Bullet(data.x, data.y, data.angle, p.stats, data.id));
            } else if (data.type === 'dash') {
                // Visual feedback for opponent dash
                createSparks(data.x, data.y, p.stats.color, 15);
                p.isDashing = true;
                setTimeout(() => p.isDashing = false, 300);
            }
        });

        function updateLeaderboard() {
            const sorted = Object.values(players).sort((a, b) => b.score - a.score).slice(0, 5);
            lbList.innerHTML = sorted.map(p => 
                `<div class="lb-entry" style="color:${p.stats.color}">${p.username}: ${p.score}</div>`
            ).join('');
        }

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Joystick Logic
        let joystick = { active: false, id: null, startX: 0, startY: 0, x: 0, y: 0 };
        const maxJoyRadius = 50;
        let isAttacking = false;

        actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); isAttacking = true; }, {passive: false});
        actionBtn.addEventListener('touchend', (e) => { e.preventDefault(); isAttacking = false; }, {passive: false});

        window.addEventListener('touchstart', (e) => {
            if(!gameActive) return;
            e.preventDefault();
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(!joystick.active && t.clientX < width / 2) {
                    joystick.active = true; joystick.id = t.identifier;
                    joystick.startX = joystick.x = t.clientX; joystick.startY = joystick.y = t.clientY;
                }
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if(!gameActive) return;
            e.preventDefault();
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(joystick.active && t.identifier === joystick.id) {
                    let dx = t.clientX - joystick.startX, dy = t.clientY - joystick.startY;
                    let dist = Math.hypot(dx, dy);
                    if(dist > maxJoyRadius) { dx = (dx / dist) * maxJoyRadius; dy = (dy / dist) * maxJoyRadius; }
                    joystick.x = joystick.startX + dx; joystick.y = joystick.startY + dy;
                }
            }
        }, {passive: false});

        const handleTouchEnd = (e) => {
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(joystick.active && t.identifier === joystick.id) { joystick.active = false; joystick.id = null; }
            }
        };
        window.addEventListener('touchend', handleTouchEnd);
        window.addEventListener('touchcancel', handleTouchEnd);

        function createSparks(x, y, color, count) {
            for(let i = 0; i < count; i++) particles.push(new Particle(x, y, color, 5, 2, 20));
        }

        class Particle {
            constructor(x, y, color, speed, size, life) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * speed; this.vy = (Math.random() - 0.5) * speed;
                this.color = color; this.size = size; this.life = this.maxLife = life;
            }
            update() {
                this.vx *= 0.96; this.vy *= 0.96; this.x += this.vx; this.y += this.vy; this.life--;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Bullet {
            constructor(x, y, angle, stats, owner) {
                this.x = x; this.y = y; this.owner = owner; this.color = stats.color;
                this.radius = stats.bRadius; this.bounces = stats.bounce; this.life = 120;
                this.vx = Math.cos(angle) * stats.bSpeed; this.vy = Math.sin(angle) * stats.bSpeed;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life--;
                if (this.x < 0 || this.x > width) { this.vx *= -1; this.bounces--; createSparks(this.x, this.y, this.color, 3); }
                if (this.y < 0 || this.y > height) { this.vy *= -1; this.bounces--; createSparks(this.x, this.y, this.color, 3); }
                if (Math.random() > 0.5) particles.push(new Particle(this.x, this.y, this.color, 2, 2, 10));
            }
            draw(ctx) {
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Player {
            constructor(id, username, stats) {
                this.id = id; this.username = username; this.stats = stats;
                this.x = Math.random() * (window.innerWidth || 800); this.y = Math.random() * (window.innerHeight || 600);
                this.vx = 0; this.vy = 0; this.angle = 0; this.cooldown = 0; 
                this.dead = false; this.respawnTimer = 0; this.score = 0;
                this.isDashing = false;
            }
            
            update() {
                if (this.dead) {
                    if (--this.respawnTimer <= 0) this.respawn();
                    return;
                }

                if (this.id === myId) {
                    if (joystick.active) {
                        let dx = joystick.x - joystick.startX, dy = joystick.y - joystick.startY;
                        let dist = Math.hypot(dx, dy);
                        if (dist > 5) {
                            this.angle = Math.atan2(dy, dx);
                            let power = (dist / maxJoyRadius) * 0.45 * this.stats.speed; 
                            this.vx += Math.cos(this.angle) * power; this.vy += Math.sin(this.angle) * power;
                        }
                    } else {
                        if (keys['KeyA']) this.angle -= 0.08;
                        if (keys['KeyD']) this.angle += 0.08;
                        if (keys['KeyW']) {
                            this.vx += Math.cos(this.angle) * 0.45 * this.stats.speed; 
                            this.vy += Math.sin(this.angle) * 0.45 * this.stats.speed;
                        }
                    }

                    if ((isAttacking || keys['Space']) && this.cooldown <= 0) {
                        this.executeAttack();
                    }
                    if (this.cooldown > 0) this.cooldown--;

                    this.vx *= 0.95; this.vy *= 0.95;
                    this.x += this.vx; this.y += this.vy;
                    
                    // Boundaries
                    if (this.x < this.stats.size) { this.x = this.stats.size; this.vx *= -0.5; }
                    if (this.x > width - this.stats.size) { this.x = width - this.stats.size; this.vx *= -0.5; }
                    if (this.y < this.stats.size) { this.y = this.stats.size; this.vy *= -0.5; }
                    if (this.y > height - this.stats.size) { this.y = height - this.stats.size; this.vy *= -0.5; }

                    socket.emit('move', {x: this.x, y: this.y, angle: this.angle});
                }
            }

            executeAttack() {
                this.cooldown = this.stats.cd;
                let bx = this.x + Math.cos(this.angle) * (this.stats.size + 10);
                let by = this.y + Math.sin(this.angle) * (this.stats.size + 10);

                if (this.stats.type === 'shoot') {
                    bullets.push(new Bullet(bx, by, this.angle, this.stats, this.id));
                    socket.emit('action', {type: 'shoot', x: bx, y: by, angle: this.angle});
                    this.vx -= Math.cos(this.angle) * 2; this.vy -= Math.sin(this.angle) * 2;
                } else if (this.stats.type === 'dash') {
                    // Melee Dash Character
                    this.vx += Math.cos(this.angle) * this.stats.dashPower;
                    this.vy += Math.sin(this.angle) * this.stats.dashPower;
                    this.isDashing = true;
                    createSparks(this.x, this.y, this.stats.color, 15);
                    socket.emit('action', {type: 'dash', x: this.x, y: this.y, angle: this.angle});
                    setTimeout(() => this.isDashing = false, 300); // Dash hitbox active for 300ms
                }
                shakeScreen(3, 5);
            }

            die(killerId) {
                this.dead = true; this.respawnTimer = 150;
                shakeScreen(10, 15);
                createSparks(this.x, this.y, this.stats.color, 30);
                if (killerId && killerId === myId) {
                    // I got the kill, tell server
                    socket.emit('scoredKill', myId);
                }
            }

            respawn() {
                this.dead = false; this.vx = 0; this.vy = 0;
                this.x = Math.random() * width; this.y = Math.random() * height;
            }

            draw(ctx) {
                if (this.dead) return;
                
                // Draw Username
                ctx.fillStyle = "rgba(255,255,255,0.7)";
                ctx.font = "10px Orbitron"; ctx.textAlign = "center";
                ctx.fillText(this.username, this.x, this.y - this.stats.size - 10);

                // Draw Character
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.shadowBlur = this.isDashing ? 20 : 10; 
                ctx.shadowColor = this.stats.color;
                ctx.strokeStyle = this.stats.color; ctx.lineWidth = 3; ctx.fillStyle = '#111';
                ctx.beginPath(); 
                ctx.moveTo(this.stats.size, 0); 
                ctx.lineTo(-this.stats.size, -this.stats.size * 0.8); 
                ctx.lineTo(-this.stats.size * 0.4, 0); 
                ctx.lineTo(-this.stats.size, this.stats.size * 0.8); 
                ctx.closePath(); ctx.fill(); ctx.stroke(); 
                ctx.restore();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x < width; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = 0; y < height; y += 50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        function drawJoystick() {
            if (!joystick.active) return;
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(joystick.startX, joystick.startY, maxJoyRadius, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath(); ctx.arc(joystick.x, joystick.y, 20, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }

        function loop() {
            if (!gameActive) return;

            const myPlayer = players[myId];
            if(myPlayer) myPlayer.update();

            // Handle Projectiles & Hit Detection
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();
                if (b.life <= 0 || b.bounces < 0) { bullets.splice(i, 1); continue; }

                // Check bullet hitting players
                for (let pid in players) {
                    let p = players[pid];
                    if (!p.dead && b.owner !== pid && Math.hypot(b.x - p.x, b.y - p.y) < p.stats.size + b.radius) {
                        if(pid === myId) p.die(b.owner); // Only tell server if I died
                        bullets.splice(i, 1);
                        break;
                    }
                }
            }

            // Handle Melee Dash Collisions
            if(myPlayer && !myPlayer.dead && myPlayer.isDashing) {
                for (let pid in players) {
                    if(pid !== myId) {
                        let p = players[pid];
                        if (!p.dead && Math.hypot(myPlayer.x - p.x, myPlayer.y - p.y) < myPlayer.stats.size + p.stats.size) {
                            // Local player dashes into someone else
                            p.die(myId); 
                        }
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            if (shakeTime > 0) shakeTime--;

            // Rendering
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.fillStyle = 'rgba(5, 5, 8, 0.4)'; ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);

            drawGrid();
            drawJoystick();

            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => p.draw(ctx));
            bullets.forEach(b => b.draw(ctx));
            
            // Draw all players
            for(let id in players) players[id].draw(ctx);

            ctx.restore();
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
