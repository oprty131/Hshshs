<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON STRIKE - Online Arena</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050508; overflow: hidden;
            font-family: 'Orbitron', sans-serif; user-select: none;
            touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none;
        }
        #gameCanvas { display: none; width: 100%; height: 100%; } 
        body::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #login-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; color: white; background: rgba(5, 5, 8, 0.9);
        }
        .login-box {
            background: rgba(20, 20, 30, 0.8); padding: 2rem; border-radius: 10px;
            border: 2px solid #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            text-align: center; width: 80%; max-width: 400px;
        }
        .login-box h1 { margin-top: 0; color: #fff; text-shadow: 0 0 10px #00f3ff; }
        input {
            width: 85%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444;
            color: #00f3ff; font-family: 'Orbitron', sans-serif; font-size: 1rem; text-align: center;
        }
        input:focus { outline: none; border-color: #ff0055; box-shadow: 0 0 10px #ff0055; }
        button {
            width: 100%; padding: 15px; margin-top: 15px; background: #00f3ff; color: #000;
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem;
            border: none; cursor: pointer; transition: 0.2s;
        }
        button:hover, button:active { background: #fff; box-shadow: 0 0 15px #00f3ff; }
        #error-msg { color: #ff0055; font-size: 0.9rem; margin-top: 10px; text-shadow: 0 0 5px #ff0055; }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none; display: none; flex-direction: column; justify-content: space-between;
        }
        .score-container { display: flex; justify-content: space-between; padding: 2rem 5vw; font-size: clamp(3rem, 8vw, 4rem); font-weight: 900; }
        .p1-score { color: #00f3ff; text-shadow: 0 0 10px #00f3ff; }
        .p2-score { color: #ff0055; text-shadow: 0 0 10px #ff0055; }
        .controls { text-align: center; padding: 1rem; color: rgba(255,255,255,0.4); font-size: 0.8rem; }
        
        #announcement {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(2rem, 5vw, 4rem); color: white; text-align: center;
            text-shadow: 0 0 20px rgba(255,255,255,0.8); opacity: 1; transition: opacity 0.3s;
        }
        
        .shoot-btn {
            position: absolute; bottom: 10%; right: 5%; width: 80px; height: 80px;
            border-radius: 50%; background: rgba(0, 0, 0, 0.5); color: white;
            font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 900;
            border: 2px solid #00f3ff; box-shadow: 0 0 15px #00f3ff;
            z-index: 20; pointer-events: auto; display: flex; align-items: center; justify-content: center;
        }
        .shoot-btn:active { background: rgba(255, 255, 255, 0.2); }
        @media (hover: hover) and (pointer: fine) { .shoot-btn { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>NEON STRIKE</h1>
            <input type="text" id="usernameInput" placeholder="ENTER USERNAME" maxlength="10" autocomplete="off">
            <input type="text" id="roomInput" placeholder="ENTER ROOM CODE" maxlength="10" autocomplete="off">
            <button id="joinBtn">JOIN MATCH</button>
            <div id="error-msg"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="score-container">
            <div class="p1-score" id="score1">0</div>
            <div class="p2-score" id="score2">0</div>
        </div>
        <div id="announcement">
            <div id="winnerText">WAITING FOR PLAYER 2</div>
        </div>
        <div class="shoot-btn" id="shootBtn">SHOOT</div>
        <div class="controls">USE JOYSTICK/WASD TO MOVE, BUTTON/SPACE TO SHOOT</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const loginScreen = document.getElementById('login-screen');
        const uiLayer = document.getElementById('ui-layer');
        const joinBtn = document.getElementById('joinBtn');
        const errorMsg = document.getElementById('error-msg');
        const announcement = document.getElementById('announcement');
        const winnerText = document.getElementById('winnerText');
        const shootBtn = document.getElementById('shootBtn');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');

        let width, height;
        let myPlayerNum = null;
        let gameActive = false;
        let score = { p1: 0, p2: 0 };
        const WIN_SCORE = 5;
        let shakeTime = 0, shakeMagnitude = 0;

        function shakeScreen(magnitude, time) {
            shakeMagnitude = magnitude; shakeTime = time;
        }

        joinBtn.addEventListener('click', () => {
            const user = document.getElementById('usernameInput').value.trim();
            const room = document.getElementById('roomInput').value.trim().toUpperCase();
            if (!user || !room) { errorMsg.innerText = "USERNAME AND ROOM REQUIRED"; return; }
            errorMsg.innerText = "CONNECTING...";
            socket.emit('joinRoom', { username: user, room: room });
        });

        socket.on('init', (num) => {
            myPlayerNum = num;
            if (num === 2) shootBtn.style.borderColor = '#ff0055';
            loginScreen.style.display = 'none';
            canvas.style.display = 'block';
            uiLayer.style.display = 'flex';
            resize(); loop(); 
        });

        socket.on('roomError', (msg) => { errorMsg.innerText = msg; });
        socket.on('gameReady', () => {
            winnerText.innerText = 'FIGHT!';
            setTimeout(() => { announcement.style.opacity = 0; }, 1500);
            gameActive = true;
        });
        socket.on('opponentLeft', () => {
            gameActive = false; announcement.style.opacity = 1;
            winnerText.innerText = 'OPPONENT DISCONNECTED';
        });

        socket.on('opponentMoved', (data) => {
            let opponent = myPlayerNum === 1 ? p2 : p1;
            opponent.x = data.x; opponent.y = data.y; opponent.angle = data.angle;
        });

        socket.on('opponentShot', (data) => {
            let opponent = myPlayerNum === 1 ? p2 : p1;
            bullets.push(new Bullet(data.x, data.y, data.angle, opponent.color, opponent.id));
        });

        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- NEW VIRTUAL JOYSTICK LOGIC ---
        let joystick = { active: false, id: null, startX: 0, startY: 0, x: 0, y: 0 };
        const maxJoyRadius = 50;
        let isShooting = false;

        // Shoot Button Events (Isolated to not interfere with Joystick)
        shootBtn.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); isShooting = true; }, {passive: false});
        shootBtn.addEventListener('touchend', (e) => { e.stopPropagation(); e.preventDefault(); isShooting = false; }, {passive: false});

        // Global Touch Events for Joystick
        window.addEventListener('touchstart', (e) => {
            if(loginScreen.style.display !== 'none') return;
            e.preventDefault();
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                // Activate joystick only if touched on the left half of the screen
                if(!joystick.active && t.clientX < width / 2) {
                    joystick.active = true;
                    joystick.id = t.identifier;
                    joystick.startX = t.clientX;
                    joystick.startY = t.clientY;
                    joystick.x = t.clientX;
                    joystick.y = t.clientY;
                }
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            if(loginScreen.style.display !== 'none') return;
            e.preventDefault();
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(joystick.active && t.identifier === joystick.id) {
                    let dx = t.clientX - joystick.startX;
                    let dy = t.clientY - joystick.startY;
                    let dist = Math.hypot(dx, dy);
                    
                    // Constrain joystick visually to max radius
                    if(dist > maxJoyRadius) {
                        dx = (dx / dist) * maxJoyRadius;
                        dy = (dy / dist) * maxJoyRadius;
                    }
                    joystick.x = joystick.startX + dx;
                    joystick.y = joystick.startY + dy;
                }
            }
        }, {passive: false});

        const handleTouchEnd = (e) => {
            for(let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(joystick.active && t.identifier === joystick.id) {
                    joystick.active = false;
                    joystick.id = null;
                }
            }
        };
        window.addEventListener('touchend', handleTouchEnd);
        window.addEventListener('touchcancel', handleTouchEnd);


        const particles = [];
        const bullets = [];

        class Particle {
            constructor(x, y, color, speed, size, life) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * speed; this.vy = (Math.random() - 0.5) * speed;
                this.color = color; this.size = size; this.life = life; this.maxLife = life;
                this.friction = 0.96;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy; this.life--;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color; ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            }
        }

        class Bullet {
            constructor(x, y, angle, color, owner) {
                this.x = x; this.y = y;
                const speed = 15;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.owner = owner;
                this.radius = 4; this.bounces = 1; this.life = 120;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.life--;
                if (this.x < 0 || this.x > width) { this.vx *= -1; this.bounces--; this.createSparks(); }
                if (this.y < 0 || this.y > height) { this.vy *= -1; this.bounces--; this.createSparks(); }
                if (Math.random() > 0.5) particles.push(new Particle(this.x, this.y, this.color, 2, 2, 15));
            }
            createSparks() {
                for(let i = 0; i < 5; i++) particles.push(new Particle(this.x, this.y, this.color, 5, 2, 20));
            }
            draw(ctx) {
                ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        class Ship {
            constructor(x, y, color, id) {
                this.id = id; this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.angle = id === 1 ? 0 : Math.PI; this.color = color;
                this.size = 15; this.cooldown = 0; this.dead = false; this.respawnTimer = 0;
            }
            update() {
                if (this.dead) {
                    this.respawnTimer--;
                    if (this.respawnTimer <= 0) this.respawn();
                    return;
                }

                if (!gameActive) return; 
                
                if (this.id === myPlayerNum) {
                    
                    // JOYSTICK PHYSICS
                    if (joystick.active) {
                        let dx = joystick.x - joystick.startX;
                        let dy = joystick.y - joystick.startY;
                        let dist = Math.hypot(dx, dy);
                        
                        if (dist > 5) { // Small deadzone so resting thumb doesn't jitter
                            this.angle = Math.atan2(dy, dx);
                            // Thrust power based on how far joystick is pulled (max 0.45)
                            let power = (dist / maxJoyRadius) * 0.45; 
                            this.vx += Math.cos(this.angle) * power; 
                            this.vy += Math.sin(this.angle) * power;
                        }
                    } else {
                        // KEYBOARD FALLBACK
                        if (keys['KeyA']) this.angle -= 0.08;
                        if (keys['KeyD']) this.angle += 0.08;
                        if (keys['KeyW']) {
                            this.vx += Math.cos(this.angle) * 0.45; this.vy += Math.sin(this.angle) * 0.45;
                        }
                    }

                    if ((isShooting || keys['Space']) && this.cooldown <= 0) {
                        let bx = this.x + Math.cos(this.angle) * (this.size + 5);
                        let by = this.y + Math.sin(this.angle) * (this.size + 5);
                        bullets.push(new Bullet(bx, by, this.angle, this.color, this.id));
                        socket.emit('shoot', {x: bx, y: by, angle: this.angle});
                        this.cooldown = 15;
                        this.vx -= Math.cos(this.angle) * 2;
                        this.vy -= Math.sin(this.angle) * 2;
                        shakeScreen(3, 5);
                    }
                    if (this.cooldown > 0) this.cooldown--;

                    this.vx *= 0.97; this.vy *= 0.97;
                    this.x += this.vx; this.y += this.vy;
                    
                    if (this.x < this.size) { this.x = this.size; this.vx *= -0.5; }
                    if (this.x > width - this.size) { this.x = width - this.size; this.vx *= -0.5; }
                    if (this.y < this.size) { this.y = this.size; this.vy *= -0.5; }
                    if (this.y > height - this.size) { this.y = height - this.size; this.vy *= -0.5; }

                    socket.emit('move', {x: this.x, y: this.y, angle: this.angle});
                }
            }
            die() {
                this.dead = true; this.respawnTimer = 100;
                shakeScreen(15, 20);
                for(let i = 0; i < 50; i++) {
                    particles.push(new Particle(this.x, this.y, this.color, 12, Math.random() * 4 + 2, 40));
                    particles.push(new Particle(this.x, this.y, '#fff', 8, 2, 30));
                }
            }
            respawn() {
                this.dead = false; this.vx = 0; this.vy = 0;
                this.x = this.id === 1 ? width * 0.1 : width * 0.9;
                this.y = height / 2;
                this.angle = this.id === 1 ? 0 : Math.PI;
            }
            draw(ctx) {
                if (this.dead) return;
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.fillStyle = '#111';
                ctx.beginPath(); ctx.moveTo(this.size, 0); ctx.lineTo(-this.size, -this.size * 0.8); 
                ctx.lineTo(-this.size * 0.4, 0); ctx.lineTo(-this.size, this.size * 0.8); 
                ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
            }
        }

        let p1 = new Ship(100, window.innerHeight / 2, '#00f3ff', 1);
        let p2 = new Ship(window.innerWidth - 100, window.innerHeight / 2, '#ff0055', 2);

        function triggerWin(playerNum) {
            gameActive = false;
            winnerText.innerText = `PLAYER ${playerNum} WINS`;
            winnerText.style.color = playerNum === 1 ? '#00f3ff' : '#ff0055';
            announcement.style.opacity = 1;
            
            setTimeout(() => {
                score = { p1: 0, p2: 0 };
                score1El.innerText = '0'; score2El.innerText = '0';
                p1.respawn(); p2.respawn();
                bullets.length = 0; particles.length = 0;
                announcement.style.opacity = 0;
                gameActive = true;
            }, 4000);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x < width; x += 50) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for (let y = 0; y < height; y += 50) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();
        }

        // --- DRAW VIRTUAL JOYSTICK ---
        function drawJoystick() {
            if (!joystick.active) return;
            
            ctx.save();
            ctx.globalCompositeOperation = 'source-over'; // Don't blend neon into white blob
            
            // Set color based on player
            let joyColor = myPlayerNum === 1 ? 'rgba(0, 243, 255, ' : 'rgba(255, 0, 85, ';

            // Draw outer circle
            ctx.strokeStyle = joyColor + '0.3)';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, maxJoyRadius, 0, Math.PI * 2);
            ctx.stroke();

            // Draw inner knob
            ctx.fillStyle = joyColor + '0.7)';
            ctx.beginPath();
            ctx.arc(joystick.x, joystick.y, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function loop() {
            if (!myPlayerNum) return; 

            // PHYSICS UPDATE
            p1.update(); p2.update();
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update();
                if (b.life <= 0 || b.bounces < 0) { bullets.splice(i, 1); continue; }

                // HIT DETECTION
                if (!p1.dead && b.owner !== 1 && Math.hypot(b.x - p1.x, b.y - p1.y) < p1.size + b.radius) {
                    p1.die(); score.p2++; score2El.innerText = score.p2; bullets.splice(i, 1);
                    if (score.p2 >= WIN_SCORE) triggerWin(2);
                    continue;
                }
                if (!p2.dead && b.owner !== 2 && Math.hypot(b.x - p2.x, b.y - p2.y) < p2.size + b.radius) {
                    p2.die(); score.p1++; score1El.innerText = score.p1; bullets.splice(i, 1);
                    if (score.p1 >= WIN_SCORE) triggerWin(1);
                    continue;
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            if (shakeTime > 0) shakeTime--;

            // RENDERING
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.fillStyle = 'rgba(5, 5, 8, 0.3)'; ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
            }

            drawGrid();
            drawJoystick();

            ctx.globalCompositeOperation = 'lighter';
            particles.forEach(p => p.draw(ctx));
            bullets.forEach(b => b.draw(ctx));
            p1.draw(ctx);
            p2.draw(ctx);

            ctx.restore();

            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
